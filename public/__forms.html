<!DOCTYPE html>
<!--
  Static form so Netlify registers the "notify" form at build time. The visible
  signup (NotifyForm.tsx) posts to this endpoint via fetch. Not linked anywhere.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Forms</title>
  </head>
  <body>
    <form name="notify" netlify netlify-honeypot="bot-field" hidden>
      <input type="hidden" name="form-name" value="notify" />
      <input type="email" name="email" />
      <input name="bot-field" />
    </form>
  </body>
</html>
